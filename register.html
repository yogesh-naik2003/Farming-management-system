<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌾 Farmer Registration | Smart Agri Portal</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Google Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Use the register.png background image */
            background-image: url('register.png');
            background-size: cover; /* Changed from 100% 100% to 'cover' for better scaling */
            background-position: center;
            background-attachment: fixed; /* Keeps the background still on scroll */
        }
        
        /* Custom animation for fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        
        /* MODIFICATION: 
          - Updated inputs for a "dark glass" theme
          - Text is white, background is transparent
        */
        .form-input {
            @apply w-full px-4 py-3 border border-gray-600 bg-black/30 rounded-lg text-white placeholder-gray-400 focus:ring-2 focus:ring-green-400 focus:bg-black/50 outline-none transition-all duration-200;
        }
        
        /* MODIFICATION: Labels are now light-colored */
        .form-label {
            @apply block text-sm font-semibold text-gray-100 mb-1;
        }
    </style>
</head>

<!-- Removed bg-gray-50 as the body style tag handles the background -->
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 
      MODIFICATION:
      - Changed bg-white/70 to bg-black/50 (dark glass)
      - Kept backdrop-blur-md for the "frosted" effect
    -->
    <div class="w-full max-w-3xl bg-black/50 backdrop-blur-md shadow-2xl rounded-2xl overflow-hidden animate-fade-in">
        
        <div class="p-8 md:p-12 w-full">
            
            <!-- Form Header -->
            <div class="text-center mb-8">
                <!-- Icon -->
                <div class="mx-auto w-16 h-16 bg-gradient-to-r from-green-500 to-teal-500 text-white rounded-full flex items-center justify-center shadow-lg">
                    <svg class="w-9 h-9" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                    </svg>
                </div>
                <!-- MODIFICATION: Text color changed to white/light gray -->
                <h2 class="text-3xl font-extrabold text-white mt-4">Create Your Farmer Account</h2>
                <p class="text-center text-gray-300 mt-2">Join the Smart Agri Network</p>
            </div>

            <!-- MODIFICATION: Form now uses a table for layout -->
            <form>
                <table class="w-full">
                    <tbody>
                        <!-- Name -->
                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="full-name" class="form-label">Full Name</label>
                            </td>
                            <td class="pb-5" colspan="3">
                                <input id="full-name" type="text" placeholder="Enter your full name" class="form-input" required>
                            </td>
                        </tr>

                        <!-- Contact Info -->
                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="phone" class="form-label">Phone Number</label>
                            </td>
                            <td class="pb-5 pr-4 align-top">
                                <input id="phone" type="tel" placeholder="9876543210" class="form-input" required>
                            </td>
                            <td class="pb-5 pr-2 align-top">
                                <label for="email" class="form-label">Email (Optional)</label>
                            </td>
                            <td class="pb-5 align-top">
                                <input id="email" type="email" placeholder="you@example.com" class="form-input">
                            </td>
                        </tr>

                        <!-- Address -->
                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="village" class="form-label">Village / Town</label>
                            </td>
                            <td class="pb-5 pr-4 align-top">
                                <input id="village" type="text" placeholder="Village or Town" class="form-input" required>
                            </td>
                            <td class="pb-5 pr-2 align-top">
                                <label for="district" class="form-label">District</label>
                            </td>
                            <td class="pb-5 align-top">
                                <input id="district" type="text" placeholder="District" class="form-input" required>
                            </td>
                        </tr>

                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="state" class="form-label">State</label>
                            </td>
                            <td class="pb-5 pr-4 align-top">
                                <input id="state" type="text" placeholder="State" class="form-input" required>
                            </td>
                            <td class="pb-5 pr-2 align-top">
                                <label for="pincode" class="form-label">Pincode</label>
                            </td>
                            <td class="pb-5 align-top">
                                <input id="pincode" type="text" placeholder="123456" class="form-input" required>
                            </td>
                        </tr>

                        <!-- Farm Details -->
                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="farm-size" class="form-label">Farm Size (in Acres)</label>
                            </td>
                            <td class="pb-5" colspan="3">
                                <input id="farm-size" type="number" placeholder="e.g., 5.5" class="form-input">
                            </td>
                        </tr>

                        <!-- Password -->
                        <tr>
                            <td class="pb-5 pr-2 align-top">
                                <label for="password" class="form-label">Create Password</label>
                            </td>
                            <td class="pb-5 pr-4 align-top">
                                <input id="password" type="password" placeholder="••••••••" class="form-input" required>
                            </td>
                            <td class="pb-5 pr-2 align-top">
                                <label for="confirm-password" class="form-label">Confirm Password</label>
                            </td>
                            <td class="pb-5 align-top">
                                <input id="confirm-password" type="password" placeholder="••••••••" class="form-input" required>
                            </td>
                        </tr>

                        <!-- Terms -->
                        <tr>
                            <td class="pt-2 pb-5" colspan="4">
                                <div class="flex items-start">
                                    <input id="terms" name="terms" type="checkbox" class="h-4 w-4 text-green-600 mt-1 border-gray-500 rounded focus:ring-green-500" required>
                                    <!-- MODIFICATION: Text color changed to light gray -->
                                    <label for="terms" class="ml-3 text-sm text-gray-200">
                                        I agree to the <a href="#" class="text-green-400 font-semibold hover:underline">Terms and Conditions</a>
                                    </label>
                                </div>
                            </td>
                        </tr>

                        <!-- Button -->
                        <tr>
                            <td class="pt-2" colspan="4">
                                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-teal-600 text-white py-3 rounded-lg shadow-lg font-semibold text-lg hover:from-green-600 hover:to-teal-700 transition-all transform hover:-translate-y-0.5 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 mt-4">
                                    Register Now
                                </button>
                            </td>
                        </tr>
                        
                        <!-- Login -->
                        <tr>
                            <td class="pt-5" colspan="4">
                                <!-- MODIFICATION: Text color changed to light gray -->
                                <p class="text-center text-gray-300 text-sm">
                                    Already registered? 
                                    <a href="#" class="text-green-400 font-semibold hover:underline">Login here</a>
                                </p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>

</body>
</html>
